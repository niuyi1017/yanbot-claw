services:
  yanbot-claw:
    image: ${IMAGE_NAME:-docker.niuy.xyz/niuyi1017/yanbot-claw}:${IMAGE_TAG:-staging-latest}
    container_name: yanbot-claw-staging
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - env/.env.staging
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
