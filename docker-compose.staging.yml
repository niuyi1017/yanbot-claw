services:
  yanbot-claw:
    image: ${IMAGE_NAME:-docker.niuy.xyz/niuyi1017/yanbot-claw}:${IMAGE_TAG:-staging-latest}
    container_name: yanbot-claw-staging
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - env/.env.staging
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
