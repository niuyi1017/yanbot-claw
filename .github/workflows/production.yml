name: Deploy to Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: yanbot-claw-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CLAW_PROD_HOST }}
          username: ${{ secrets.CLAW_PROD_USER }}
          password: ${{ secrets.CLAW_PROD_PWD }}
          port: ${{ secrets.CLAW_PROD_PORT }}
          script: |
            set -e
            cd /www/yanbot-claw
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use 22
            fi

            node -v
            corepack enable
            corepack prepare pnpm@latest --activate
            pnpm install --frozen-lockfile --registry=https://registry.npmmirror.com
            pnpm run build

            pm2 describe yanbot-claw > /dev/null \
              && pm2 restart yanbot-claw \
              || pm2 start pnpm --name yanbot-claw -- start
            pm2 save
            pm2 ls

      - name: Deployment summary
        if: always()
        run: |
          echo "### Production deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
